services:
  # Standard Postgres + pgvector (plain image — we talk to it directly via
  # psycopg/DATABASE_URL, so we don't need the heavyweight supabase/postgres
  # image and its role-setup machinery).
  supabase-db:
    image: pgvector/pgvector:pg16
    container_name: ta-agent-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: ta_agent
    volumes:
      - supabase_data:/var/lib/postgresql/data
      # Migrations are auto-applied on first boot of a fresh volume
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ta_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Lightweight DB GUI at http://localhost:8080 (works with any Postgres).
  adminer:
    image: adminer:4
    container_name: ta-agent-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: supabase-db
    depends_on:
      supabase-db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: ta-agent-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  supabase_data:
